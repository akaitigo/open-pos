name: openpos

services:
  postgres:
    image: postgres:17-alpine
    container_name: openpos-postgres
    ports:
      - '15432:5432'
    environment:
      POSTGRES_USER: openpos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openpos_dev}
      POSTGRES_DB: openpos
    volumes:
      - openpos-pgdata:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openpos']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - openpos-net

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: openpos-pgbouncer
    ports:
      - '16432:6432'
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: openpos
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD:-openpos_dev}
      DATABASES_DBNAME: openpos
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pidof pgbouncer || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - openpos-net

  redis:
    image: redis:7-alpine
    container_name: openpos-redis
    ports:
      - '16379:6379'
    # WARNING: 本番では REDIS_PASSWORD を必ず設定すること
    command: >-
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-openpos_dev}
    volumes:
      - openpos-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-openpos_dev}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - openpos-net

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: openpos-rabbitmq
    ports:
      - '15672:5672'
      - '15673:15672'
    environment:
      RABBITMQ_DEFAULT_USER: openpos
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-openpos_dev}
    volumes:
      - openpos-rabbitmq:/var/lib/rabbitmq
      - ./init-scripts/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./init-scripts/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openpos-net

  hydra-migrate:
    image: oryd/hydra:v2.2
    container_name: openpos-hydra-migrate
    environment:
      DSN: postgres://openpos:${POSTGRES_PASSWORD:-openpos_dev}@postgres:5432/openpos?sslmode=disable&search_path=hydra
    command: migrate sql -e --yes
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - openpos-net
    restart: on-failure

  hydra:
    image: oryd/hydra:v2.2
    container_name: openpos-hydra
    ports:
      - '14444:4444'
      - '14445:4445'
    environment:
      DSN: postgres://openpos:${POSTGRES_PASSWORD:-openpos_dev}@postgres:5432/openpos?sslmode=disable&search_path=hydra
      # WARNING: 本番環境では必ず HYDRA_SECRETS_SYSTEM をランダムな値に設定してください。
      # デフォルト値はローカル開発専用です。例: openssl rand -hex 32
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM:-openpos-hydra-secret-for-dev-only}
      URLS_SELF_ISSUER: http://localhost:14444/
      URLS_CONSENT: http://localhost:3000/consent
      URLS_LOGIN: http://localhost:3000/login
      URLS_LOGOUT: http://localhost:3000/logout
      LOG_LEVEL: info
    # WARNING: --dev はローカル開発専用。本番では --dev を削除し、TLS を有効化すること。
    command: serve all ${HYDRA_SERVE_FLAGS:---dev}
    depends_on:
      postgres:
        condition: service_healthy
      hydra-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:4445/health/alive || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openpos-net
    restart: unless-stopped

  # === Backend Services ===
  api-gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
    container_name: openpos-api-gateway
    ports:
      - '8080:8080'
    environment:
      QUARKUS_PROFILE: docker
      QUARKUS_HTTP_PORT: 8080
      REDIS_URL: redis://redis:6379
      HYDRA_JWKS_URL: http://hydra:4444/.well-known/jwks.json
      HYDRA_ISSUER: http://hydra:4444/
      OPENPOS_AUTH_ENABLED: '${OPENPOS_AUTH_ENABLED:-true}'
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: 9000
      STORE_SERVICE_HOST: store-service
      STORE_SERVICE_PORT: 9000
      POS_SERVICE_HOST: pos-service
      POS_SERVICE_PORT: 9000
      INVENTORY_SERVICE_HOST: inventory-service
      INVENTORY_SERVICE_PORT: 9000
      ANALYTICS_SERVICE_HOST: analytics-service
      ANALYTICS_SERVICE_PORT: 9000
    depends_on:
      redis:
        condition: service_healthy
      hydra:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:8080/q/health/ready || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openpos-net

  product-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: product-service
    container_name: openpos-product-service
    ports:
      - '8081:8080'
      - '9001:9000'
    environment:
      QUARKUS_PROFILE: docker
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_GRPC_SERVER_PORT: 9000
      QUARKUS_FLYWAY_MIGRATE_AT_START: 'true'
      DB_URL: jdbc:postgresql://postgres:5432/openpos
      DB_USER: openpos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openpos_dev}
      REDIS_URL: redis://redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-openpos}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-openpos_dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:8080/q/health/ready || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openpos-net

  store-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: store-service
    container_name: openpos-store-service
    ports:
      - '8082:8080'
      - '9002:9000'
    environment:
      QUARKUS_PROFILE: docker
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_GRPC_SERVER_PORT: 9000
      QUARKUS_FLYWAY_MIGRATE_AT_START: 'true'
      DB_URL: jdbc:postgresql://postgres:5432/openpos
      DB_USER: openpos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openpos_dev}
      REDIS_URL: redis://redis:6379
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: 9000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-openpos}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-openpos_dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:8080/q/health/ready || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openpos-net

  pos-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: pos-service
    container_name: openpos-pos-service
    ports:
      - '8083:8080'
      - '9003:9000'
    environment:
      QUARKUS_PROFILE: docker
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_GRPC_SERVER_PORT: 9000
      QUARKUS_FLYWAY_MIGRATE_AT_START: 'true'
      DB_URL: jdbc:postgresql://postgres:5432/openpos
      DB_USER: openpos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openpos_dev}
      REDIS_URL: redis://redis:6379
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: 9000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-openpos}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-openpos_dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:8080/q/health/ready || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openpos-net

  inventory-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: inventory-service
    container_name: openpos-inventory-service
    ports:
      - '8084:8080'
      - '9004:9000'
    environment:
      QUARKUS_PROFILE: docker
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_GRPC_SERVER_PORT: 9000
      QUARKUS_FLYWAY_MIGRATE_AT_START: 'true'
      DB_URL: jdbc:postgresql://postgres:5432/openpos
      DB_USER: openpos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openpos_dev}
      REDIS_URL: redis://redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-openpos}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-openpos_dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:8080/q/health/ready || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openpos-net

  analytics-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: analytics-service
    container_name: openpos-analytics-service
    ports:
      - '8085:8080'
      - '9005:9000'
    environment:
      QUARKUS_PROFILE: docker
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_GRPC_SERVER_PORT: 9000
      QUARKUS_FLYWAY_MIGRATE_AT_START: 'true'
      DB_URL: jdbc:postgresql://postgres:5432/openpos
      DB_USER: openpos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-openpos_dev}
      REDIS_URL: redis://redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-openpos}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-openpos_dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:8080/q/health/ready || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openpos-net

  # === Observability ===
  loki:
    image: grafana/loki:3.4.2
    container_name: openpos-loki
    ports:
      - '13100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openpos-net

  grafana:
    image: grafana/grafana:12.0.1
    container_name: openpos-grafana
    ports:
      - '13000:3000'
    environment:
      # WARNING: 本番環境では GRAFANA_ADMIN_PASSWORD を変更し、匿名アクセスを無効にしてください
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: '${GRAFANA_ANONYMOUS_ENABLED:-true}'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - openpos-grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openpos-net

volumes:
  openpos-pgdata:
  openpos-redis:
  openpos-rabbitmq:
  openpos-grafana:

networks:
  openpos-net:
    driver: bridge
