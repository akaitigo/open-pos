# WARNING: このファイルを本番シークレットで直接編集しないでください。
# 本番環境では以下のいずれかを使用すること:
#   - GCP Secret Manager + External Secrets Operator
#   - SealedSecrets (Bitnami)
#   - SOPS + age/GPG
# このファイルはテンプレートとしてのみ使用し、実際の値をGitにコミットしないこと。
apiVersion: v1
kind: Secret
metadata:
  name: openpos-secrets
  namespace: openpos
  labels:
    app.kubernetes.io/part-of: openpos
type: Opaque
stringData:
  # --- Database ---
  DB_USER: 'CHANGE_ME'
  DB_PASSWORD: 'CHANGE_ME'
  DB_URL: 'jdbc:postgresql://postgres:5432/openpos'

  # --- Redis ---
  REDIS_URL: 'redis://redis:6379'

  # --- RabbitMQ ---
  RABBITMQ_USER: 'CHANGE_ME'
  RABBITMQ_PASS: 'CHANGE_ME'

  # --- ORY Hydra (JWT / OIDC) ---
  HYDRA_JWKS_URL: 'CHANGE_ME'
  HYDRA_ISSUER: 'CHANGE_ME'
