# Kubernetes Secret for sensitive configuration values.
# In production, use SealedSecrets, SOPS, or an external-secrets operator
# to inject real values. The placeholders below must be replaced before apply.
apiVersion: v1
kind: Secret
metadata:
  name: openpos-secrets
  namespace: openpos
  labels:
    app.kubernetes.io/part-of: openpos
type: Opaque
stringData:
  # --- Database ---
  DB_USER: 'CHANGE_ME'
  DB_PASSWORD: 'CHANGE_ME'
  DB_URL: 'jdbc:postgresql://postgres:5432/openpos'

  # --- Redis ---
  REDIS_URL: 'redis://redis:6379'

  # --- RabbitMQ ---
  RABBITMQ_USER: 'CHANGE_ME'
  RABBITMQ_PASS: 'CHANGE_ME'

  # --- ORY Hydra (JWT / OIDC) ---
  HYDRA_JWKS_URL: 'CHANGE_ME'
  HYDRA_ISSUER: 'CHANGE_ME'
