apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openpos-ingress
  namespace: openpos
  labels:
    app.kubernetes.io/part-of: openpos
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/use-regex: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: '10m'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '60'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.openpos.example.com
        - pos.openpos.example.com
        - admin.openpos.example.com
      secretName: openpos-tls
  rules:
    - host: api.openpos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
    - host: pos.openpos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pos-terminal
                port:
                  number: 80
    - host: admin.openpos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-dashboard
                port:
                  number: 80
