apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: openpos
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: ghcr.io/akaitigo/open-pos/inventory-service:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: grpc
          envFrom:
            - configMapRef:
                name: inventory-service-config
            - secretRef:
                name: openpos-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: openpos
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  namespace: openpos
data:
  QUARKUS_HTTP_PORT: '8080'
  QUARKUS_GRPC_SERVER_PORT: '9000'
