apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-service
  namespace: openpos
  labels:
    app: store-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store-service
  template:
    metadata:
      labels:
        app: store-service
    spec:
      containers:
        - name: store-service
          image: ghcr.io/akaitigo/open-pos/store-service:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: grpc
          envFrom:
            - configMapRef:
                name: store-service-config
            - secretRef:
                name: openpos-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: store-service
  namespace: openpos
spec:
  selector:
    app: store-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: store-service-config
  namespace: openpos
data:
  QUARKUS_HTTP_PORT: "8080"
  QUARKUS_GRPC_SERVER_PORT: "9000"
