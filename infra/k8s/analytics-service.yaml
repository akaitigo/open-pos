apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: openpos
  labels:
    app: analytics-service
    app.kubernetes.io/part-of: openpos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        app.kubernetes.io/part-of: openpos
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: analytics-service
          image: ghcr.io/akaitigo/open-pos/analytics-service:__IMAGE_TAG__
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: grpc
          envFrom:
            - configMapRef:
                name: analytics-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: DB_PASSWORD
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: DB_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: REDIS_URL
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: RABBITMQ_PASS
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: '5672'
          startupProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: openpos
spec:
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 9000
      targetPort: 9000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: analytics-service-pdb
  namespace: openpos
  labels:
    app: analytics-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: analytics-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: openpos
  labels:
    app: analytics-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
  namespace: openpos
data:
  QUARKUS_HTTP_PORT: '8080'
  QUARKUS_GRPC_SERVER_PORT: '9000'
