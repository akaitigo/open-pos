apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: openpos
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: openpos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: openpos
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: api-gateway
          image: ghcr.io/akaitigo/open-pos/api-gateway:__IMAGE_TAG__
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              name: http

          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: REDIS_URL
            - name: HYDRA_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: HYDRA_JWKS_URL
            - name: HYDRA_ISSUER
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: HYDRA_ISSUER
            - name: OPENPOS_SESSION_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: OPENPOS_SESSION_JWT_SECRET
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: CORS_ALLOWED_ORIGINS
            - name: PRODUCT_SERVICE_HOST
              value: product-service
            - name: PRODUCT_SERVICE_PORT
              value: '9000'
            - name: STORE_SERVICE_HOST
              value: store-service
            - name: STORE_SERVICE_PORT
              value: '9000'
            - name: POS_SERVICE_HOST
              value: pos-service
            - name: POS_SERVICE_PORT
              value: '9000'
            - name: INVENTORY_SERVICE_HOST
              value: inventory-service
            - name: INVENTORY_SERVICE_PORT
              value: '9000'
            - name: ANALYTICS_SERVICE_HOST
              value: analytics-service
            - name: ANALYTICS_SERVICE_PORT
              value: '9000'
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: '5672'
          startupProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: openpos
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: openpos
  labels:
    app: api-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: openpos
  labels:
    app: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: openpos
data:
  QUARKUS_HTTP_PORT: '8080'
