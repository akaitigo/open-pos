apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: openpos
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/akaitigo/open-pos/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http

          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: REDIS_URL
            - name: HYDRA_JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: HYDRA_JWKS_URL
            - name: HYDRA_ISSUER
              valueFrom:
                secretKeyRef:
                  name: openpos-secrets
                  key: HYDRA_ISSUER
          startupProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: openpos
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: openpos
  labels:
    app: api-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: openpos
  labels:
    app: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: openpos
data:
  QUARKUS_HTTP_PORT: '8080'
