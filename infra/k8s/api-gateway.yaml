apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: openpos
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/akaitigo/open-pos/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http

          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                name: openpos-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: openpos
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: openpos
data:
  QUARKUS_HTTP_PORT: '8080'
