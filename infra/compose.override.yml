services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openpos-pgadmin
    ports:
      - "15080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@openpos.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - postgres
    networks:
      - openpos-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: openpos-redis-commander
    ports:
      - "18081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - openpos-net
