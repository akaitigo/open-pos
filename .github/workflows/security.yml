name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual full-history scan

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Dependency Manifest Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend_dependencies: ${{ steps.filter.outputs.frontend_dependencies }}
      backend_dependencies: ${{ steps.filter.outputs.backend_dependencies }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            frontend_dependencies:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'apps/**/package.json'
              - 'packages/**/package.json'
              - 'e2e/package.json'
            backend_dependencies:
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - 'services/**/build.gradle.kts'

  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.30.0'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Cache gitleaks
        id: cache-gitleaks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-${{ env.GITLEAKS_VERSION }}-linux-x64
      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            commit_shas="$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --jq '.[].sha')"
            first_commit="$(printf '%s\n' "${commit_shas}" | head -n1)"
            last_commit="$(printf '%s\n' "${commit_shas}" | tail -n1)"
            log_opts="--no-merges --first-parent ${first_commit}^..${last_commit}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [[ "${before_sha}" == "${head_sha}" || "${before_sha}" == "0000000000000000000000000000000000000000" ]]; then
              log_opts="-1"
            else
              log_opts="--no-merges --first-parent ${before_sha}^..${head_sha}"
            fi
          else
            log_opts="--all"
          fi

          verbose_flag=""
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            verbose_flag="--verbose"
          fi

          gitleaks git \
            --no-banner \
            --redact \
            ${verbose_flag} \
            --exit-code=2 \
            --report-format=sarif \
            --report-path=results.sarif \
            --log-opts="${log_opts}" \
            .
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: results.sarif
          retention-days: 90
          if-no-files-found: ignore

  dependency-audit:
    name: Dependency Vulnerability Scan
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      # PRs compare against the base branch so pre-existing monorepo vulnerabilities
      # do not block unrelated dependency updates. Pushes and scheduled scans remain
      # absolute gates on the current default branch state.
      - name: pnpm audit diff against base branch (frontend)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.frontend_dependencies == 'true' }}
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high --json > pnpm-audit-head.json || true

          git fetch origin "${{ github.event.pull_request.base.ref }}:base-compare"
          base_dir="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "${base_dir}"
          }
          trap cleanup EXIT

          git worktree add --detach "${base_dir}" base-compare

          (
            cd "${base_dir}"
            pnpm install --frozen-lockfile
            pnpm audit --audit-level=high --json > "${GITHUB_WORKSPACE}/pnpm-audit-base.json" || true
          )

          node scripts/ci/compare-pnpm-audit.mjs \
            --base pnpm-audit-base.json \
            --head pnpm-audit-head.json

      - name: pnpm audit (frontend)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high

      - name: Gradle dependency verification (backend)
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.backend_dependencies == 'true' }}
        run: ./gradlew dependencies

  container-scan:
    name: Container Security Scan (Trivy)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: '0.69.3'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - product-service
          - store-service
          - pos-service
          - inventory-service
          - analytics-service
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Build Docker image
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          docker build \
            --build-arg SERVICE_NAME="${SERVICE_NAME}" \
            -t "openpos-${SERVICE_NAME}:scan" \
            -f infra/docker/Dockerfile.service .
      - name: Cache Trivy
        id: cache-trivy
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: /usr/local/bin/trivy
          key: trivy-${{ env.TRIVY_VERSION }}-linux-x64
      - name: Install Trivy
        if: steps.cache-trivy.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSLo trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tar.gz trivy
          install trivy /usr/local/bin/trivy
          trivy version
      - name: Run Trivy scan
        id: trivy
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --format json \
            --output "trivy-${SERVICE_NAME}.json" \
            "openpos-${SERVICE_NAME}:scan" || echo "vulnerabilities_found=true" >> "$GITHUB_OUTPUT"
      - name: Display scan results
        if: always()
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            "openpos-${SERVICE_NAME}:scan" || true
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.json
          retention-days: 90
          if-no-files-found: ignore
      - name: Warn on vulnerabilities
        if: steps.trivy.outputs.vulnerabilities_found == 'true'
        run: |
          echo "::warning::Trivy detected HIGH/CRITICAL vulnerabilities in ${{ matrix.service }}. Review the uploaded trivy-report artifact."

  sbom:
    name: SBOM Generation
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate npm SBOM
        run: pnpm --filter pos-terminal exec -- npx @cyclonedx/cyclonedx-npm --output-file sbom-frontend.json || true
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom-*.json
          retention-days: 90
