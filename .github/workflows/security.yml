name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual full-history scan

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.30.0'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Cache gitleaks
        id: cache-gitleaks
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-${{ env.GITLEAKS_VERSION }}-linux-x64
      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            commit_shas="$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --jq '.[].sha')"
            first_commit="$(printf '%s\n' "${commit_shas}" | head -n1)"
            last_commit="$(printf '%s\n' "${commit_shas}" | tail -n1)"
            log_opts="--no-merges --first-parent ${first_commit}^..${last_commit}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [[ "${before_sha}" == "${head_sha}" || "${before_sha}" == "0000000000000000000000000000000000000000" ]]; then
              log_opts="-1"
            else
              log_opts="--no-merges --first-parent ${before_sha}^..${head_sha}"
            fi
          else
            log_opts="--all"
          fi

          verbose_flag=""
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            verbose_flag="--verbose"
          fi

          gitleaks git \
            --no-banner \
            --redact \
            ${verbose_flag} \
            --exit-code=2 \
            --report-format=sarif \
            --report-path=results.sarif \
            --log-opts="${log_opts}" \
            .
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gitleaks-sarif
          path: results.sarif
          retention-days: 90
          if-no-files-found: ignore

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (frontend)
        run: pnpm audit --audit-level=high

      - name: Gradle dependency verification (backend)
        run: ./gradlew dependencies

  container-scan:
    name: Container Security Scan (Trivy)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: '0.69.3'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - product-service
          - store-service
          - pos-service
          - inventory-service
          - analytics-service
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Build Docker image
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          docker build \
            --build-arg SERVICE_NAME="${SERVICE_NAME}" \
            -t "openpos-${SERVICE_NAME}:scan" \
            -f infra/docker/Dockerfile.service .
      - name: Cache Trivy
        id: cache-trivy
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: /usr/local/bin/trivy
          key: trivy-${{ env.TRIVY_VERSION }}-linux-x64
      - name: Install Trivy
        if: steps.cache-trivy.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSLo trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tar.gz trivy
          install trivy /usr/local/bin/trivy
          trivy version
      - name: Run Trivy scan
        id: trivy
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --format json \
            --output "trivy-${SERVICE_NAME}.json" \
            "openpos-${SERVICE_NAME}:scan" || echo "vulnerabilities_found=true" >> "$GITHUB_OUTPUT"
      - name: Display scan results
        if: always()
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            "openpos-${SERVICE_NAME}:scan" || true
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.json
          retention-days: 90
          if-no-files-found: ignore
      - name: Warn on vulnerabilities
        if: steps.trivy.outputs.vulnerabilities_found == 'true'
        run: |
          echo "::warning::Trivy detected HIGH/CRITICAL vulnerabilities in ${{ matrix.service }}. Review the uploaded trivy-report artifact."

  sbom:
    name: SBOM Generation
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate npm SBOM
        run: pnpm --filter pos-terminal exec -- npx @cyclonedx/cyclonedx-npm --output-file sbom-frontend.json || true
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: sbom-*.json
          retention-days: 90
