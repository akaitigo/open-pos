name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.30.0'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Cache gitleaks
        id: cache-gitleaks
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-${{ env.GITLEAKS_VERSION }}-linux-x64
      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            commit_shas="$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --jq '.[].sha')"
            first_commit="$(printf '%s\n' "${commit_shas}" | head -n1)"
            last_commit="$(printf '%s\n' "${commit_shas}" | tail -n1)"
            log_opts="--no-merges --first-parent ${first_commit}^..${last_commit}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [[ "${before_sha}" == "${head_sha}" || "${before_sha}" == "0000000000000000000000000000000000000000" ]]; then
              log_opts="-1"
            else
              log_opts="--no-merges --first-parent ${before_sha}^..${head_sha}"
            fi
          else
            log_opts="--all"
          fi

          gitleaks git \
            --no-banner \
            --redact \
            --exit-code=2 \
            --report-format=sarif \
            --report-path=results.sarif \
            --log-opts="${log_opts}" \
            .

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (frontend)
        run: pnpm audit --audit-level=high

      - name: Gradle dependency verification (backend)
        run: ./gradlew dependencies

  container-scan:
    name: Container Security Scan (Trivy)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: '0.69.3'
    strategy:
      matrix:
        service:
          - api-gateway
          - product-service
          - store-service
          - pos-service
          - inventory-service
          - analytics-service
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Build Docker image
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          docker build \
            --build-arg SERVICE_NAME="${SERVICE_NAME}" \
            -t "openpos-${SERVICE_NAME}:scan" \
            -f infra/docker/Dockerfile.service .
      - name: Cache Trivy
        id: cache-trivy
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: /usr/local/bin/trivy
          key: trivy-${{ env.TRIVY_VERSION }}-linux-x64
      - name: Install Trivy
        if: steps.cache-trivy.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSLo trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tar.gz trivy
          install trivy /usr/local/bin/trivy
          trivy version
      - name: Run Trivy scan
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --format table \
            "openpos-${SERVICE_NAME}:scan"
