name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch main branch for breaking change detection
        run: git fetch origin main:main
        if: github.event_name == 'pull_request'
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
        working-directory: proto
      - run: buf breaking --against '../.git#branch=main,subdir=proto'
        working-directory: proto
        if: github.event_name == 'pull_request'

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v5
      - name: Build
        run: >-
          ./gradlew
          :services:api-gateway:build
          :services:product-service:build
          :services:store-service:build
          -x test --no-build-cache
      - name: Test
        run: >-
          ./gradlew
          :services:api-gateway:test
          :services:product-service:test
          :services:store-service:test
          --no-build-cache

  frontend:
    name: Frontend Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test -- --run
      - run: pnpm -r build
