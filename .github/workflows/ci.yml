name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
        working-directory: proto
      - run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main'
        working-directory: proto
        if: github.event_name == 'pull_request'

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: openpos
          POSTGRES_PASSWORD: openpos_dev
          POSTGRES_DB: openpos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: graalce
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Init DB schemas
        run: psql -h localhost -U openpos -d openpos -f infra/init-scripts/postgres/01_init.sql
        env:
          PGPASSWORD: openpos_dev
      - name: Build
        run: ./gradlew build -x test
      - name: Test
        run: ./gradlew test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/openpos
          DB_USER: openpos
          DB_PASSWORD: openpos_dev

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r build
