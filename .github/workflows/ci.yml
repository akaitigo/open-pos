name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
            backend:
              - 'services/**'
              - 'proto/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
            frontend:
              - 'apps/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            e2e:
              - 'apps/**'
              - 'packages/**'
              - 'services/**'
              - 'proto/**'
              - 'infra/**'
              - 'e2e/**'
              - 'Makefile'

  proto-lint:
    name: Proto Lint
    needs: [changes]
    if: ${{ needs.changes.outputs.proto == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Fetch main branch for breaking change detection
        run: git fetch origin main:main
        if: github.event_name == 'pull_request'
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: '1.50.0'
          setup_only: 'true'
      - run: buf lint
        working-directory: proto
      - run: buf breaking --against '../.git#branch=main,subdir=proto'
        working-directory: proto
        if: github.event_name == 'pull_request'

  backend:
    name: Backend Build & Test
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Build
        run: >-
          ./gradlew --parallel
          :services:api-gateway:build
          :services:product-service:build
          :services:store-service:build
          :services:pos-service:build
          :services:inventory-service:build
          :services:analytics-service:build
          -x test
      - name: Unit & Functional Test
        run: >-
          ./gradlew --parallel
          :services:api-gateway:test
          :services:product-service:test
          :services:store-service:test
          :services:pos-service:test
          :services:inventory-service:test
          :services:analytics-service:test
          :services:api-gateway:jacocoTestCoverageVerification
          :services:product-service:jacocoTestCoverageVerification
          :services:store-service:jacocoTestCoverageVerification
          :services:pos-service:jacocoTestCoverageVerification
          :services:inventory-service:jacocoTestCoverageVerification
      - name: Upload Coverage Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-coverage
          path: services/*/build/reports/jacoco/
        if: ${{ !cancelled() }}
      - name: Integration Test (Testcontainers)
        run: >-
          ./gradlew --parallel
          :services:product-service:test
          -Dquarkus.test.profile=integration
        if: ${{ !cancelled() }}

  frontend:
    name: Frontend Build, Lint & Test
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - name: Unit & Functional Test with Coverage
        run: |
          pnpm --filter pos-terminal test:coverage &
          PID1=$!
          pnpm --filter admin-dashboard test:coverage &
          PID2=$!
          wait $PID1 $PID2
      - run: pnpm -r build
      - name: Upload Coverage Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-coverage
          path: apps/*/coverage/
        if: always()

  e2e:
    name: E2E Test (Playwright)
    needs: [changes]
    if: ${{ needs.changes.outputs.e2e == 'true' && (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'docs:')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Start full demo stack
        run: make docker-demo
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e exec playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter e2e exec playwright install-deps chromium
      - name: Run E2E Tests
        run: pnpm --filter e2e test
      - name: Upload E2E Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-results
          path: e2e/test-results/
        if: always()
      - name: Stop demo stack
        run: docker compose -f infra/compose.yml down -v
        if: always()
