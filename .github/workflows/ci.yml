name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Fetch main branch for breaking change detection
        run: git fetch origin main:main
        if: github.event_name == 'pull_request'
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      - run: buf lint
        working-directory: proto
      - run: buf breaking --against '../.git#branch=main,subdir=proto'
        working-directory: proto
        if: github.event_name == 'pull_request'

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Build
        run: >-
          ./gradlew
          :services:api-gateway:build
          :services:product-service:build
          :services:store-service:build
          :services:pos-service:build
          :services:inventory-service:build
          :services:analytics-service:build
          -x test --no-build-cache
      - name: Unit & Functional Test
        run: >-
          ./gradlew
          :services:api-gateway:test
          :services:product-service:test
          :services:store-service:test
          :services:pos-service:test
          :services:inventory-service:test
          :services:analytics-service:test
          --no-build-cache
      - name: JaCoCo Coverage Report
        run: >-
          ./gradlew
          :services:api-gateway:jacocoTestReport
          :services:product-service:jacocoTestReport
          :services:store-service:jacocoTestReport
          :services:pos-service:jacocoTestReport
          :services:inventory-service:jacocoTestReport
          :services:analytics-service:jacocoTestReport
        if: always()
      - name: JaCoCo Coverage Verification
        run: >-
          ./gradlew
          :services:api-gateway:jacocoTestCoverageVerification
          :services:product-service:jacocoTestCoverageVerification
          :services:store-service:jacocoTestCoverageVerification
          :services:pos-service:jacocoTestCoverageVerification
          :services:inventory-service:jacocoTestCoverageVerification
      - name: Upload Coverage Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-coverage
          path: services/*/build/reports/jacoco/
        if: always()

  backend-integration:
    name: Backend Integration Test
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Integration Test (Testcontainers)
        run: >-
          ./gradlew
          :services:product-service:test
          -Dquarkus.test.profile=integration
          --no-build-cache

  frontend:
    name: Frontend Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - name: Unit & Functional Test with Coverage
        run: pnpm --filter pos-terminal test:coverage && pnpm --filter admin-dashboard test:coverage
      - run: pnpm -r build
      - name: Upload Coverage Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-coverage
          path: apps/*/coverage/
        if: always()

  e2e:
    name: E2E Test (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true # E2E tests are skeleton-only until full-stack integration
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium
      - name: Run E2E Tests
        run: pnpm --filter e2e test
      - name: Upload E2E Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-results
          path: e2e/test-results/
        if: always()
