name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    # java-kotlin: Kotlin 2.3 未対応のため PR では無効化。main push + schedule のみ実行。
    # CodeQL の Kotlin 2.3 対応リリース時に再有効化すること。
    continue-on-error: ${{ matrix.language == 'java-kotlin' }}
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - java-kotlin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Skip Java/Kotlin CodeQL on PRs
        if: ${{ matrix.language == 'java-kotlin' && github.event_name == 'pull_request' }}
        run: |
          echo "::notice::Skipping java-kotlin CodeQL on PRs (Kotlin 2.3 unsupported)"
          echo "Kotlin 2.3 is not yet supported by CodeQL. Skipping on PRs to save ~5-10 min."
          echo "java-kotlin analysis still runs on push to main and weekly schedule."

      - name: Set up Java
        if: ${{ matrix.language == 'java-kotlin' && github.event_name != 'pull_request' }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL (javascript-typescript)
        if: ${{ matrix.language == 'javascript-typescript' }}
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Initialize CodeQL (java-kotlin)
        if: ${{ matrix.language == 'java-kotlin' && github.event_name != 'pull_request' }}
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      - name: Autobuild
        if: ${{ matrix.language == 'java-kotlin' && github.event_name != 'pull_request' }}
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

      - name: Analyze
        if: ${{ matrix.language != 'java-kotlin' || github.event_name != 'pull_request' }}
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}
