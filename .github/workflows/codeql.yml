name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    # java-kotlin CodeQL は Kotlin 2.3 未対応のため non-blocking（Trivy/gitleaks でカバー）
    continue-on-error: ${{ matrix.language == 'java-kotlin' }}
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - java-kotlin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Skip heavy Java/Kotlin CodeQL for docs PRs
        if: ${{ github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'docs:') && matrix.language == 'java-kotlin' }}
        run: echo "Skipping java-kotlin CodeQL for docs-only pull requests."

      - name: Set up Java
        if: ${{ matrix.language == 'java-kotlin' && (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'docs:')) }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL (javascript-typescript)
        if: ${{ matrix.language == 'javascript-typescript' }}
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Initialize CodeQL (java-kotlin)
        if: ${{ matrix.language == 'java-kotlin' && (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'docs:')) }}
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      - name: Autobuild
        if: ${{ matrix.language == 'java-kotlin' && (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'docs:')) }}
        uses: github/codeql-action/autobuild@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4

      - name: Analyze
        if: ${{ matrix.language != 'java-kotlin' || github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'docs:') }}
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          category: /language:${{ matrix.language }}
