name: CD Pipeline

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  version:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate semantic version
        id: version
        run: |
          # Derive version from git describe (falls back to 0.0.0 if no tags)
          RAW_VERSION=$(git describe --tags --always 2>/dev/null || echo "v0.0.0-0-g$(git rev-parse --short HEAD)")
          # Strip leading 'v' if present and normalize to semver
          # OCI仕様でDockerタグに + は使用不可のため - に置換
          SEMVER=$(echo "$RAW_VERSION" | sed 's/^v//' | sed 's/-\([0-9]*\)-g\([a-f0-9]*\)$/-\1.\2/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Version: ${SEMVER}"

  build-and-push:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - product-service
          - store-service
          - pos-service
          - inventory-service
          - analytics-service
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v4

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v7
        with:
          context: .
          file: infra/docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.version.outputs.semver }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Container image signing with Cosign (#657)
  # Automatically signs images when COSIGN_KEY secret is configured.
  # To enable: add a Cosign private key as repository secret COSIGN_KEY.
  sign-images:
    needs: [version, build-and-push]
    if: ${{ github.event_name != 'workflow_dispatch' || true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - name: Check if Cosign key is available
        id: check-key
        run: |
          if [ -n "${{ secrets.COSIGN_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::COSIGN_KEY secret not configured — skipping image signing"
          fi

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3
        if: steps.check-key.outputs.available == 'true'

      - name: Sign container images
        if: steps.check-key.outputs.available == 'true'
        run: |
          SERVICES=(api-gateway product-service store-service pos-service inventory-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            echo "Signing ${SERVICE}..."
            cosign sign --key env://COSIGN_KEY "${{ env.IMAGE_PREFIX }}/${SERVICE}:${{ github.sha }}"
          done
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}

  deploy-staging:
    needs: [version, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Update image tags in manifests
        run: |
          IMAGE_TAG="${{ needs.version.outputs.semver }}"
          SERVICES=(api-gateway product-service store-service pos-service inventory-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            sed -i "s|image: ${{ env.IMAGE_PREFIX }}/${SERVICE}:.*|image: ${{ env.IMAGE_PREFIX }}/${SERVICE}:${IMAGE_TAG}|" \
              "infra/k8s/${SERVICE}.yaml"
          done

      - name: Apply Kubernetes manifests
        run: |
          # namespace と network-policy を先に適用（他リソースの依存先）
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/network-policy.yaml
          kubectl apply -f infra/k8s/ingress.yaml
          # 全マニフェストを適用（上記含む。kubectl apply は冪等）
          kubectl apply -f infra/k8s/

      - name: Wait for rollout completion
        run: |
          SERVICES=(api-gateway product-service store-service pos-service inventory-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            echo "Waiting for ${SERVICE} rollout..."
            kubectl rollout status deployment/"${SERVICE}" -n openpos --timeout=300s
          done

      - name: Verify deployment
        run: |
          echo "Deployed version: ${{ needs.version.outputs.semver }}"
          echo "Commit SHA: ${{ github.sha }}"
          kubectl get deployments -n openpos
          kubectl get pods -n openpos

  deploy-prod:
    needs: [version, build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production # Requires manual approval via GitHub Environments
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pre-deploy health check
        run: |
          echo "Running pre-deploy health checks..."
          kubectl get nodes -o wide
          kubectl get ns openpos || kubectl create ns openpos

      - name: Validate required secrets exist
        run: |
          echo "Validating required secrets in openpos-secrets..."
          REQUIRED_KEYS=(CORS_ALLOWED_ORIGINS HYDRA_JWKS_URL HYDRA_ISSUER OPENPOS_SESSION_JWT_SECRET REDIS_URL DB_URL)
          MISSING=()
          for KEY in "${REQUIRED_KEYS[@]}"; do
            if ! kubectl get secret openpos-secrets -n openpos -o jsonpath="{.data.${KEY}}" 2>/dev/null | base64 -d | grep -q .; then
              MISSING+=("$KEY")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing or empty required secrets: ${MISSING[*]}"
            echo "Ensure these are configured in GCP Secret Manager and ExternalSecret has synced."
            exit 1
          fi
          echo "All required secrets validated."

      - name: Apply ExternalSecret for GCP Secret Manager
        run: |
          kubectl apply -f infra/k8s/external-secret.yaml
          echo "Waiting for ExternalSecret to sync..."
          kubectl wait --for=condition=Ready externalsecret/openpos-secrets -n openpos --timeout=120s || true

      - name: Apply production ConfigMaps
        run: |
          if [ -f infra/k8s/configmap-prod.yaml ]; then
            kubectl apply -f infra/k8s/configmap-prod.yaml
          else
            echo "::warning::configmap-prod.yaml not found — using per-service ConfigMaps from k8s manifests"
          fi

      - name: Update image tags in manifests
        run: |
          IMAGE_TAG="${{ needs.version.outputs.semver }}"
          SERVICES=(api-gateway product-service store-service pos-service inventory-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            sed -i "s|image: ${{ env.IMAGE_PREFIX }}/${SERVICE}:.*|image: ${{ env.IMAGE_PREFIX }}/${SERVICE}:${IMAGE_TAG}|" \
              "infra/k8s/${SERVICE}.yaml"
          done

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/network-policy.yaml
          kubectl apply -f infra/k8s/ingress.yaml
          kubectl apply -f infra/k8s/

      - name: Wait for rollout completion
        run: |
          SERVICES=(api-gateway product-service store-service pos-service inventory-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            echo "Waiting for ${SERVICE} rollout..."
            kubectl rollout status deployment/"${SERVICE}" -n openpos --timeout=600s
          done

      - name: Post-deploy verification
        run: |
          echo "=== Production Deploy Complete ==="
          echo "Version: ${{ needs.version.outputs.semver }}"
          echo "Commit:  ${{ github.sha }}"
          echo ""
          kubectl get deployments -n openpos
          kubectl get pods -n openpos
          echo ""
          echo "Checking pod health..."
          kubectl get pods -n openpos -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\n"}{end}'
