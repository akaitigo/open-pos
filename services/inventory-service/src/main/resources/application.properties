# Application
quarkus.application.name=inventory-service

# gRPC Server
quarkus.grpc.server.port=${QUARKUS_GRPC_SERVER_PORT:9004}
quarkus.http.port=${QUARKUS_HTTP_PORT:0}

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:openpos}
quarkus.datasource.password=${DB_PASSWORD:openpos_dev}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:15432/openpos}
quarkus.hibernate-orm.database.default-schema=inventory_schema
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=inventory_schema

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:16379}

# RabbitMQ
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:15672}
rabbitmq-username=${RABBITMQ_USER:openpos}
rabbitmq-password=${RABBITMQ_PASS:openpos_dev}

# Health
quarkus.smallrye-health.root-path=/health

# Dev profile (quarkusDev with local infra via Docker Compose)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/openpos
%dev.quarkus.datasource.username=openpos
%dev.quarkus.datasource.password=openpos_dev
%dev.quarkus.redis.hosts=redis://localhost:16379
%dev.quarkus.grpc.server.port=9004
%dev.quarkus.http.port=8084
