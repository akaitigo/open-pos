# Test profile configuration

# Database: H2 in-memory (PostgreSQL compatibility mode)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.hibernate-orm.database.generation=drop-and-create

# Flyway: disable in test (Hibernate manages schema)
quarkus.flyway.migrate-at-start=false

# Redis: disable devservices, use mock in test
quarkus.redis.devservices.enabled=false
quarkus.redis.hosts=redis://localhost:6379

# RabbitMQ: disable in test
quarkus.rabbitmq.devservices.enabled=false

# JWT: disable verification in test
mp.jwt.verify.publickey.location=
smallrye.jwt.verify.key.location=

# gRPC clients: mock ports for test
quarkus.grpc.clients.product-service.host=localhost
quarkus.grpc.clients.product-service.port=9999
quarkus.grpc.clients.store-service.host=localhost
quarkus.grpc.clients.store-service.port=9998

# gRPC: use random test port
quarkus.grpc.server.port=0
quarkus.grpc.server.test-port=0

# HTTP: enable with random port for health check tests
quarkus.http.port=8080
quarkus.http.test-port=0

# Datasource health check: disable (no real DB in test)
quarkus.datasource.health.enabled=false
