# Application
quarkus.application.name=api-gateway
quarkus.shutdown.timeout=30s

# gRPC code generation
quarkus.generate-code.grpc.kotlin.generate=false
quarkus.http.port=${QUARKUS_HTTP_PORT:8080}
quarkus.log.category."io.quarkus.grpc.runtime.supports".level=ERROR

# Security Headers
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."Referrer-Policy".value=strict-origin-when-cross-origin
quarkus.http.header."Permissions-Policy".value=camera=(), microphone=(), geolocation=()
%prod.quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-organization-id
quarkus.http.cors.exposed-headers=location
# Production CORS: no default — deployment MUST set CORS_ALLOWED_ORIGINS.
# Quarkus will fail to start if the env var is missing, preventing misconfigured deploys.
%prod.quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS}

# JWT (ORY Hydra)
# Dev/test defaults point to local Docker Compose Hydra instance.
# Production overrides below remove defaults to enforce explicit configuration.
mp.jwt.verify.publickey.location=${HYDRA_JWKS_URL:http://localhost:14444/.well-known/jwks.json}
mp.jwt.verify.issuer=${HYDRA_ISSUER:http://localhost:14444/}
%prod.mp.jwt.verify.publickey.location=${HYDRA_JWKS_URL}
%prod.mp.jwt.verify.issuer=${HYDRA_ISSUER}

# Session JWT signing key (Base64-encoded HMAC-SHA256 secret, min 256 bits)
# Production: inject via GCP Secret Manager → OPENPOS_SESSION_JWT_SECRET env var
# Rotation: update secret + rolling restart. Old tokens expire naturally (8h TTL).
openpos.session.jwt.secret=${OPENPOS_SESSION_JWT_SECRET}

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://:openpos_dev@localhost:16379}

# gRPC clients
quarkus.grpc.clients.product-service.host=${PRODUCT_SERVICE_HOST:localhost}
quarkus.grpc.clients.product-service.port=${PRODUCT_SERVICE_PORT:9001}
quarkus.grpc.clients.store-service.host=${STORE_SERVICE_HOST:localhost}
quarkus.grpc.clients.store-service.port=${STORE_SERVICE_PORT:9002}
quarkus.grpc.clients.pos-service.host=${POS_SERVICE_HOST:localhost}
quarkus.grpc.clients.pos-service.port=${POS_SERVICE_PORT:9003}
quarkus.grpc.clients.inventory-service.host=${INVENTORY_SERVICE_HOST:localhost}
quarkus.grpc.clients.inventory-service.port=${INVENTORY_SERVICE_PORT:9004}
quarkus.grpc.clients.analytics-service.host=${ANALYTICS_SERVICE_HOST:localhost}
quarkus.grpc.clients.analytics-service.port=${ANALYTICS_SERVICE_PORT:9005}

# Health (Quarkus standard: /q/health/live, /q/health/ready)
quarkus.smallrye-health.root-path=/q/health

# Micrometer / Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# OpenTelemetry (disabled by default; enable via QUARKUS_OTEL_ENABLED=true when a collector is available)
quarkus.otel.enabled=${QUARKUS_OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:14317}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name}
quarkus.otel.propagators=tracecontext,baggage
%prod.quarkus.otel.enabled=true
%prod.quarkus.otel.traces.sampler=traceidratio
%prod.quarkus.otel.traces.sampler.arg=0.1

# Auth: default is enabled; local demo can explicitly disable via OPENPOS_AUTH_ENABLED=false
openpos.auth.enabled=${OPENPOS_AUTH_ENABLED:true}
openpos.auth.skip-paths=/api/health,/q/,/api/staff/{id}/authenticate,/api/events

# Structured Logging
quarkus.log.level=INFO
%prod.quarkus.log.console.json=true

# Dev profile (quarkusDev with local infra via Docker Compose)
%dev.quarkus.redis.hosts=redis://:openpos_dev@localhost:16379
%dev.mp.jwt.verify.publickey.location=http://localhost:14444/.well-known/jwks.json
%dev.mp.jwt.verify.issuer=http://localhost:14444/
%dev.openpos.session.jwt.secret=Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tMjU2Yml0cw==

# gRPC client deadline (#498)
quarkus.grpc.clients.product-service.deadline=5000
quarkus.grpc.clients.store-service.deadline=5000
quarkus.grpc.clients.pos-service.deadline=5000
quarkus.grpc.clients.inventory-service.deadline=5000
quarkus.grpc.clients.analytics-service.deadline=5000

# gRPC connection pooling + keep-alive (#158)
quarkus.grpc.clients.product-service.keep-alive-time=30s
quarkus.grpc.clients.product-service.keep-alive-timeout=5s
quarkus.grpc.clients.store-service.keep-alive-time=30s
quarkus.grpc.clients.store-service.keep-alive-timeout=5s
quarkus.grpc.clients.pos-service.keep-alive-time=30s
quarkus.grpc.clients.pos-service.keep-alive-timeout=5s
quarkus.grpc.clients.inventory-service.keep-alive-time=30s
quarkus.grpc.clients.inventory-service.keep-alive-timeout=5s
quarkus.grpc.clients.analytics-service.keep-alive-time=30s
quarkus.grpc.clients.analytics-service.keep-alive-timeout=5s

# Offline sync price validation (sen units: 10000000 = 100万円)
openpos.sync.max-unit-price=${OPENPOS_SYNC_MAX_UNIT_PRICE:10000000}

# MicroProfile Fault Tolerance
# 全環境で有効化。@Timeout(30000) で CI でも十分なマージンを確保。
# 本番はより短いタイムアウトを設定可能。
# Image upload
openpos.image.upload-dir=${OPENPOS_IMAGE_UPLOAD_DIR:/tmp/openpos/images}
openpos.image.base-url=${OPENPOS_IMAGE_BASE_URL:http://localhost:8080/api/images}

%prod.com.openpos.gateway.resource.ProductResource/Timeout/value=10000
