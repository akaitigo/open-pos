# Application
quarkus.application.name=analytics-service
quarkus.shutdown.timeout=30s

# gRPC code generation
quarkus.generate-code.grpc.kotlin.generate=false

# gRPC Server
quarkus.grpc.server.port=${QUARKUS_GRPC_SERVER_PORT:9005}
quarkus.http.port=${QUARKUS_HTTP_PORT:0}

# Database (via PgBouncer in transaction mode)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:openpos}
quarkus.datasource.password=${DB_PASSWORD:openpos_dev}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:16432/openpos}
quarkus.datasource.jdbc.additional-jdbc-properties.prepareThreshold=0
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2
quarkus.hibernate-orm.database.default-schema=analytics_schema
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.migrate-at-start=false
quarkus.flyway.schemas=analytics_schema

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:16379}

# RabbitMQ
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:15672}
rabbitmq-username=${RABBITMQ_USER:openpos}
rabbitmq-password=${RABBITMQ_PASS:openpos_dev}

# Structured Logging (JSON in prod)
quarkus.log.console.json=false
quarkus.log.console.json.additional-field.service.value=${quarkus.application.name}
%prod.quarkus.log.console.json=true

# RabbitMQ Incoming (Event Consumer)
mp.messaging.incoming.sale-completed-events.connector=smallrye-rabbitmq
mp.messaging.incoming.sale-completed-events.queue.name=analytics.sale-completed
mp.messaging.incoming.sale-completed-events.queue.declare=false
mp.messaging.incoming.sale-completed-events.exchange.name=openpos.events
mp.messaging.incoming.sale-completed-events.exchange.declare=false
mp.messaging.incoming.sale-completed-events.routing-keys=sale.completed
mp.messaging.incoming.sale-completed-events.failure-strategy=reject
mp.messaging.incoming.sale-completed-events.reconnect-attempts=10
mp.messaging.incoming.sale-completed-events.reconnect-interval=5

mp.messaging.incoming.sale-voided-events.connector=smallrye-rabbitmq
mp.messaging.incoming.sale-voided-events.queue.name=analytics.sale-voided
mp.messaging.incoming.sale-voided-events.queue.declare=false
mp.messaging.incoming.sale-voided-events.exchange.name=openpos.events
mp.messaging.incoming.sale-voided-events.exchange.declare=false
mp.messaging.incoming.sale-voided-events.routing-keys=sale.voided
mp.messaging.incoming.sale-voided-events.failure-strategy=reject
mp.messaging.incoming.sale-voided-events.reconnect-attempts=10
mp.messaging.incoming.sale-voided-events.reconnect-interval=5

# RabbitMQ Incoming (DLQ Consumer)
mp.messaging.incoming.dlq-analytics-sale-completed.connector=smallrye-rabbitmq
mp.messaging.incoming.dlq-analytics-sale-completed.queue.name=dlq.analytics.sale-completed
mp.messaging.incoming.dlq-analytics-sale-completed.queue.declare=false
mp.messaging.incoming.dlq-analytics-sale-completed.exchange.name=openpos.events.dlx
mp.messaging.incoming.dlq-analytics-sale-completed.exchange.declare=false
mp.messaging.incoming.dlq-analytics-sale-completed.routing-keys=dlq.analytics.sale-completed
mp.messaging.incoming.dlq-analytics-sale-completed.failure-strategy=reject

mp.messaging.incoming.dlq-analytics-sale-voided.connector=smallrye-rabbitmq
mp.messaging.incoming.dlq-analytics-sale-voided.queue.name=dlq.analytics.sale-voided
mp.messaging.incoming.dlq-analytics-sale-voided.queue.declare=false
mp.messaging.incoming.dlq-analytics-sale-voided.exchange.name=openpos.events.dlx
mp.messaging.incoming.dlq-analytics-sale-voided.exchange.declare=false
mp.messaging.incoming.dlq-analytics-sale-voided.routing-keys=dlq.analytics.sale-voided
mp.messaging.incoming.dlq-analytics-sale-voided.failure-strategy=reject

# RabbitMQ Outgoing (DLQ Retry)
mp.messaging.outgoing.sale-completed-retry.connector=smallrye-rabbitmq
mp.messaging.outgoing.sale-completed-retry.exchange.name=openpos.events
mp.messaging.outgoing.sale-completed-retry.exchange.declare=false
mp.messaging.outgoing.sale-completed-retry.default-routing-key=sale.completed
mp.messaging.outgoing.sale-completed-retry.reconnect-attempts=10
mp.messaging.outgoing.sale-completed-retry.reconnect-interval=5

mp.messaging.outgoing.sale-voided-retry.connector=smallrye-rabbitmq
mp.messaging.outgoing.sale-voided-retry.exchange.name=openpos.events
mp.messaging.outgoing.sale-voided-retry.exchange.declare=false
mp.messaging.outgoing.sale-voided-retry.default-routing-key=sale.voided
mp.messaging.outgoing.sale-voided-retry.reconnect-attempts=10
mp.messaging.outgoing.sale-voided-retry.reconnect-interval=5

# Health (Quarkus standard: /q/health/live, /q/health/ready)
quarkus.smallrye-health.root-path=/q/health

# Micrometer / Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# OpenTelemetry
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:14317}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name}
quarkus.otel.propagators=tracecontext,baggage
%dev.quarkus.otel.enabled=false
%prod.quarkus.otel.traces.sampler=traceidratio
%prod.quarkus.otel.traces.sampler.arg=0.1

# GCP Secret Manager (prod only)
%prod.quarkus.gcp.secret-manager.enabled=true

# Dev profile (quarkusDev with local infra via Docker Compose)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:16432/openpos
%dev.quarkus.datasource.username=openpos
%dev.quarkus.datasource.password=openpos_dev
%dev.quarkus.redis.hosts=redis://localhost:16379
%dev.quarkus.grpc.server.port=9005
%dev.quarkus.http.port=8085
%dev.quarkus.grpc.server.enable-reflection-service=true
