# Application
quarkus.application.name=product-service
quarkus.shutdown.timeout=30s

# gRPC code generation
quarkus.generate-code.grpc.kotlin.generate=false

# gRPC Server
quarkus.grpc.server.port=${QUARKUS_GRPC_SERVER_PORT:9001}
quarkus.http.port=${QUARKUS_HTTP_PORT:0}

# Database (via PgBouncer in transaction mode)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:openpos}
quarkus.datasource.password=${DB_PASSWORD:openpos_dev}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:16432/openpos}
quarkus.datasource.jdbc.additional-jdbc-properties.prepareThreshold=0
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2
quarkus.hibernate-orm.database.default-schema=product_schema
quarkus.hibernate-orm.schema-management.strategy=none

# Flyway
quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.migrate-at-start=false
quarkus.flyway.schemas=product_schema

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://:openpos_dev@localhost:16379}

# RabbitMQ
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:15672}
rabbitmq-username=${RABBITMQ_USER:openpos}
rabbitmq-password=${RABBITMQ_PASS:openpos_dev}

# Structured Logging
quarkus.log.level=INFO

# Health (Quarkus standard: /q/health/live, /q/health/ready)
quarkus.smallrye-health.root-path=/q/health

# Micrometer / Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# OpenTelemetry (disabled by default; enable via QUARKUS_OTEL_ENABLED=true when a collector is available)
quarkus.otel.enabled=${QUARKUS_OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:14317}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name}
quarkus.otel.propagators=tracecontext,baggage
%prod.quarkus.otel.enabled=true
%prod.quarkus.otel.traces.sampler=traceidratio
%prod.quarkus.otel.traces.sampler.arg=0.1

# Docker profile
%docker.quarkus.datasource.username=${DB_USER:openpos}
%docker.quarkus.datasource.password=${DB_PASSWORD:openpos_dev}

# Dev profile (quarkusDev with local infra via Docker Compose)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:16432/openpos
%dev.quarkus.datasource.username=openpos
%dev.quarkus.datasource.password=openpos_dev
%dev.quarkus.redis.hosts=redis://:openpos_dev@localhost:16379
%dev.quarkus.grpc.server.port=9001
%dev.quarkus.http.port=8081
%dev.quarkus.grpc.server.enable-reflection-service=true

# gRPC server message size limit (1MB)
quarkus.grpc.server.max-inbound-message-size=1048576
