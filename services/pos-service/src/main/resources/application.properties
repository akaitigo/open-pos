# Application
quarkus.application.name=pos-service

# gRPC code generation
quarkus.generate-code.grpc.kotlin.generate=false

# gRPC Server
quarkus.grpc.server.port=${QUARKUS_GRPC_SERVER_PORT:9003}
quarkus.http.port=${QUARKUS_HTTP_PORT:0}

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:openpos}
quarkus.datasource.password=${DB_PASSWORD:openpos_dev}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:15432/openpos}
quarkus.hibernate-orm.database.default-schema=pos_schema
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=pos_schema

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:16379}

# RabbitMQ
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USER:openpos}
rabbitmq-password=${RABBITMQ_PASS:openpos_dev}

# RabbitMQ Outgoing (Event Publisher)
mp.messaging.outgoing.outgoing-events.connector=smallrye-rabbitmq
mp.messaging.outgoing.outgoing-events.exchange.name=openpos.events
mp.messaging.outgoing.outgoing-events.exchange.type=topic
mp.messaging.outgoing.outgoing-events.default-routing-key=event.unknown

# gRPC Client (product-service)
quarkus.grpc.clients.product-service.host=${PRODUCT_SERVICE_HOST:localhost}
quarkus.grpc.clients.product-service.port=${PRODUCT_SERVICE_PORT:9001}

# Structured Logging (JSON in prod)
quarkus.log.console.json=false
quarkus.log.console.json.additional-field.service.value=${quarkus.application.name}
%prod.quarkus.log.console.json=true

# Health
quarkus.smallrye-health.root-path=/health

# Micrometer / Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# OpenTelemetry
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
%dev.quarkus.otel.enabled=false

# GCP Secret Manager (prod only)
# %prod.quarkus.gcp.secret-manager.enabled=true

# Dev profile (quarkusDev with local infra via Docker Compose)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/openpos
%dev.quarkus.datasource.username=openpos
%dev.quarkus.datasource.password=openpos_dev
%dev.quarkus.redis.hosts=redis://localhost:16379
%dev.quarkus.grpc.server.port=9003
%dev.quarkus.http.port=8083
%dev.quarkus.grpc.server.enable-reflection-service=true
