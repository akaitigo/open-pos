syntax = "proto3";

// openpos.analytics.v1 パッケージは売上分析の型とサービスを提供します
package openpos.analytics.v1;

import "openpos/common/v1/common.proto";

option java_multiple_files = true;

// 売上分析サービス
// 日次・商品別・時間帯別の売上集計を提供します
// データは SaleCompleted イベントを非同期に集計して保持します
service AnalyticsService {
  // 日次売上を取得する（日付範囲指定、インボイス対応の税率別内訳含む）
  rpc GetDailySales(GetDailySalesRequest) returns (GetDailySalesResponse);
  // 商品別売上を取得する（販売数・売上金額でソート可）
  rpc GetProductSales(GetProductSalesRequest) returns (GetProductSalesResponse);
  // 時間帯別売上を取得する（特定日のピーク時間帯分析に使用）
  rpc GetHourlySales(GetHourlySalesRequest) returns (GetHourlySalesResponse);
  // 売上サマリーを取得する（期間合計・客単価・支払方法別集計）
  rpc GetSalesSummary(GetSalesSummaryRequest) returns (GetSalesSummaryResponse);
  // ABC分析を取得する（商品を売上貢献度でランク付け）
  rpc GetAbcAnalysis(GetAbcAnalysisRequest) returns (GetAbcAnalysisResponse);
  // 粗利レポートを取得する（原価と粗利の集計）
  rpc GetGrossProfitReport(GetGrossProfitReportRequest) returns (GetGrossProfitReportResponse);
  // 売上予測・トレンド分析を取得する（単純移動平均）
  rpc GetSalesForecast(GetSalesForecastRequest) returns (GetSalesForecastResponse);
  // 売上目標一覧を取得する
  rpc ListSalesTargets(ListSalesTargetsRequest) returns (ListSalesTargetsResponse);
  // 売上目標を取得する（ID指定）
  rpc GetSalesTarget(GetSalesTargetRequest) returns (GetSalesTargetResponse);
  // 売上目標を作成または更新する（store_id + target_month で一意）
  rpc UpsertSalesTarget(UpsertSalesTargetRequest) returns (UpsertSalesTargetResponse);
  // 売上目標を削除する
  rpc DeleteSalesTarget(DeleteSalesTargetRequest) returns (DeleteSalesTargetResponse);
}

// 日次売上
// 店舗ごとに1日1レコード集計します
// 金額フィールドはすべて銭単位（10000 = 100円）です
message DailySales {
  // 集計日（ISO 8601 日付形式: 例 "2024-01-15"）
  string date = 1;
  // 店舗ID
  string store_id = 2;
  // 税込総売上（銭単位）
  int64 gross_amount = 3;
  // 税抜売上（銭単位）
  int64 net_amount = 4;
  // 税額（銭単位）
  int64 tax_amount = 5;
  // 割引額（銭単位）
  int64 discount_amount = 6;
  // 取引件数
  int32 transaction_count = 7;
  // 現金売上額（銭単位）
  int64 cash_amount = 8;
  // クレジットカード売上額（銭単位）
  int64 card_amount = 9;
  // QRコード決済売上額（銭単位）
  int64 qr_amount = 10;
}

// 商品別売上
// 指定期間内の商品ごとの販売集計です
message ProductSales {
  // 商品ID
  string product_id = 1;
  // 商品名（集計時点のスナップショット）
  string product_name = 2;
  // 販売数量
  int32 quantity_sold = 3;
  // 合計売上金額（税込、銭単位）
  int64 total_amount = 4;
  // 販売に含まれた取引件数
  int32 transaction_count = 5;
}

// 時間帯別売上
// 指定日の時間帯（0-23時）ごとの集計です
// ピーク時間帯の把握・シフト計画に活用します
message HourlySales {
  // 時間帯（0〜23）
  int32 hour = 1;
  // 売上金額（税込、銭単位）
  int64 amount = 2;
  // 取引件数
  int32 transaction_count = 3;
}

// 売上サマリー
// 指定期間の合計・客単価・支払方法別集計をまとめたサマリーです
message SalesSummary {
  // 集計期間
  openpos.common.v1.DateRange period = 1;
  // 税込総売上（銭単位）
  int64 total_gross = 2;
  // 税抜総売上（銭単位）
  int64 total_net = 3;
  // 総税額（銭単位）
  int64 total_tax = 4;
  // 総割引額（銭単位）
  int64 total_discount = 5;
  // 総取引件数
  int32 total_transactions = 6;
  // 客単価（税込合計 / 取引件数、銭単位）
  int64 average_transaction = 7;
}

// === リクエスト/レスポンス ===

// 日次売上取得リクエスト
message GetDailySalesRequest {
  // 店舗ID（必須）
  string store_id = 1;
  // 集計期間（必須、最大365日を推奨）
  openpos.common.v1.DateRange date_range = 2;
}

// 日次売上取得レスポンス
message GetDailySalesResponse {
  // 日次売上リスト（日付昇順）
  repeated DailySales daily_sales = 1;
}

// 商品別売上取得リクエスト
message GetProductSalesRequest {
  // 店舗ID（必須）
  string store_id = 1;
  // 集計期間（必須）
  openpos.common.v1.DateRange date_range = 2;
  // ページネーション条件
  openpos.common.v1.PaginationRequest pagination = 3;
  // ソート基準（"quantity": 販売数降順、"amount": 売上金額降順）
  string sort_by = 4;
}

// 商品別売上取得レスポンス
message GetProductSalesResponse {
  // 商品別売上リスト
  repeated ProductSales product_sales = 1;
  // ページネーション情報
  openpos.common.v1.PaginationResponse pagination = 2;
}

// 時間帯別売上取得リクエスト
message GetHourlySalesRequest {
  // 店舗ID（必須）
  string store_id = 1;
  // 集計対象日（ISO 8601 日付形式: 例 "2024-01-15"）
  string date = 2;
}

// 時間帯別売上取得レスポンス
message GetHourlySalesResponse {
  // 時間帯別売上リスト（0〜23時の全時間帯、取引ゼロの時間帯も含む）
  repeated HourlySales hourly_sales = 1;
}

// 売上サマリー取得リクエスト
message GetSalesSummaryRequest {
  // 店舗ID（必須）
  string store_id = 1;
  // 集計期間（必須）
  openpos.common.v1.DateRange date_range = 2;
}

// 売上サマリー取得レスポンス
message GetSalesSummaryResponse {
  // 売上サマリー
  SalesSummary summary = 1;
}

// === ABC分析 ===

// ABC分析結果
message AbcAnalysisItem {
  // 商品ID
  string product_id = 1;
  // 商品名
  string product_name = 2;
  // 売上金額（銭単位）
  int64 revenue = 3;
  // 売上構成比率（0.0〜1.0）
  double revenue_ratio = 4;
  // 累積構成比率
  double cumulative_ratio = 5;
  // ランク（A/B/C）
  string rank = 6;
}

// ABC分析取得リクエスト
message GetAbcAnalysisRequest {
  // 店舗ID（必須）
  string store_id = 1;
  // 集計期間（必須）
  openpos.common.v1.DateRange date_range = 2;
}

// ABC分析取得レスポンス
message GetAbcAnalysisResponse {
  // ABC分析結果リスト（売上金額降順）
  repeated AbcAnalysisItem items = 1;
}

// === 粗利レポート ===

// 粗利レポート項目
message GrossProfitItem {
  // 商品ID
  string product_id = 1;
  // 商品名
  string product_name = 2;
  // 売上金額（銭単位）
  int64 revenue = 3;
  // 原価合計（銭単位）
  int64 cost = 4;
  // 粗利（銭単位）
  int64 gross_profit = 5;
  // 粗利率（0.0〜1.0）
  double margin_rate = 6;
  // 販売数
  int32 quantity_sold = 7;
}

// 粗利レポート取得リクエスト
message GetGrossProfitReportRequest {
  // 店舗ID（必須）
  string store_id = 1;
  // 集計期間（必須）
  openpos.common.v1.DateRange date_range = 2;
}

// 粗利レポート取得レスポンス
message GetGrossProfitReportResponse {
  // 粗利レポート項目リスト
  repeated GrossProfitItem items = 1;
  // 合計売上（銭単位）
  int64 total_revenue = 2;
  // 合計原価（銭単位）
  int64 total_cost = 3;
  // 合計粗利（銭単位）
  int64 total_gross_profit = 4;
}

// === 売上予測・トレンド分析 ===

// 売上予測データポイント
message SalesForecastPoint {
  // 日付
  string date = 1;
  // 実績売上（銭単位、過去データの場合）
  int64 actual_amount = 2;
  // 移動平均値（銭単位）
  int64 moving_average = 3;
}

// 売上予測取得リクエスト
message GetSalesForecastRequest {
  // 店舗ID（必須）
  string store_id = 1;
  // 集計期間（必須）
  openpos.common.v1.DateRange date_range = 2;
  // 移動平均の期間日数（デフォルト7）
  int32 window_days = 3;
}

// 売上予測取得レスポンス
message GetSalesForecastResponse {
  // トレンドデータポイントリスト
  repeated SalesForecastPoint data_points = 1;
}

// === 売上目標 ===

// 売上目標
// 組織×店舗×月ごとの売上目標を管理します
// 金額フィールドはすべて銭単位（10000 = 100円）です
message SalesTarget {
  // 売上目標ID
  string id = 1;
  // 店舗ID（組織全体の場合は空文字）
  string store_id = 2;
  // 対象月（ISO 8601 日付形式の月初日: 例 "2026-04-01"）
  string target_month = 3;
  // 目標金額（銭単位）
  int64 target_amount = 4;
  // 組織ID
  string organization_id = 5;
  // 作成日時（ISO 8601）
  string created_at = 6;
  // 更新日時（ISO 8601）
  string updated_at = 7;
}

// 売上目標一覧取得リクエスト
message ListSalesTargetsRequest {
  // 店舗IDフィルター（省略時は全店舗）
  string store_id = 1;
  // 月フィルター（ISO 8601 日付形式の月初日、省略時は全月）
  string month = 2;
}

// 売上目標一覧取得レスポンス
message ListSalesTargetsResponse {
  // 売上目標リスト
  repeated SalesTarget sales_targets = 1;
}

// 売上目標取得リクエスト
message GetSalesTargetRequest {
  // 売上目標ID（必須）
  string id = 1;
}

// 売上目標取得レスポンス
message GetSalesTargetResponse {
  // 売上目標
  SalesTarget sales_target = 1;
}

// 売上目標作成・更新リクエスト
// store_id + target_month で既存レコードを検索し、存在すれば更新、なければ新規作成する
message UpsertSalesTargetRequest {
  // 店舗ID（組織全体の場合は空文字）
  string store_id = 1;
  // 対象月（ISO 8601 日付形式の月初日: 例 "2026-04-01"）
  string target_month = 2;
  // 目標金額（銭単位、正の値のみ）
  int64 target_amount = 3;
}

// 売上目標作成・更新レスポンス
message UpsertSalesTargetResponse {
  // 作成または更新された売上目標
  SalesTarget sales_target = 1;
}

// 売上目標削除リクエスト
message DeleteSalesTargetRequest {
  // 売上目標ID（必須）
  string id = 1;
}

// 売上目標削除レスポンス
message DeleteSalesTargetResponse {}
